services:
  # PHP Application (Laravel + Livewire)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackathon_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
    volumes:
      - ./.env:/var/www/html/.env
    networks:
      - hackathon_network

  # Nginx Web Server
  webserver:
    image: nginx:alpine
    container_name: hackathon_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - app
    networks:
      - hackathon_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: hackathon_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # MYSQL_PASSWORD: ${DB_PASSWORD}
      # MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - hackathon_network

networks:
  hackathon_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
